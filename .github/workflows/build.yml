name: Build MagiskT

on:
    push:
        branches: [main, test]
    pull_request:
        branches: [main, test]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                build_type: [release]

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 1

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ccache python3 python3-pip gh

            - name: Cache pip
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pip
                  key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
                  restore-keys: pip-${{ runner.os }}-

            - name: Setup ccache
              run: |
                  mkdir -p ~/.ccache
                  echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
                  echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
                  echo "/usr/lib/ccache" >> $GITHUB_PATH
                  ccache --max-size=3G

            - name: Cache ccache
              uses: actions/cache@v4
              with:
                  path: ~/.ccache
                  key: ccache-${{ runner.os }}-${{ hashFiles('**/*.c','**/*.cpp','**/*.h') }}
                  restore-keys: ccache-${{ runner.os }}-

            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
                  restore-keys: gradle-${{ runner.os }}-

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17
                  cache: gradle

            - name: Setup environment
              uses: ./.github/actions/setup
              with:
                  is-asset-build: true

            - name: Replace version
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      sed -i 's/^version=.*/version=MTR/' config.prop
                  else
                      sed -i 's/^version=.*/version=MTD/' config.prop
                  fi

            - name: Build Magisk
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      python build.py -vr all
                  else
                      python build.py -v all
                  fi

            - name: Stop Gradle
              run: ./app/gradlew --stop

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: magisk_${{ matrix.build_type }}
                  path: ${{ matrix.build_type == 'release' && 'out/app-release.apk' || 'out/app-debug.apk' }}

            - name: Delete old release
              run: |
                  echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token
                  gh release delete build --yes || echo "No existing release"

            - name: Create Release
              run: |
                  echo "${{ secrets.PAT_TOKEN }}" | gh auth login --with-token

                  COMMIT_ID=$(git rev-parse --short HEAD)
                  BRANCH_NAME=${GITHUB_REF#refs/heads/}
                  BUILD_TIME=$(date +"%Y-%m-%d %H:%M:%S %Z")
                  BUILD_TYPE=${{ matrix.build_type }}

                  DESCRIPTION="Automated build of MagiskT\n
Branch: $BRANCH_NAME\n
Commit: $COMMIT_ID\n
Build type: $BUILD_TYPE\n
Build time: $BUILD_TIME\n
Triggered by: $GITHUB_ACTOR\n
Repository: $GITHUB_REPOSITORY"

                  gh release create build \
                      ${{ matrix.build_type == 'release' && 'out/app-release.apk' || 'out/app-debug.apk' }} \
                      --title "Build" \
                      --notes "$DESCRIPTION" \
                      --draft=false \
                      --prerelease=false