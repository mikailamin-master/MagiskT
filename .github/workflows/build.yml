name: Build MagiskT

on:
    push:
        branches: [main, test]
    pull_request:
        branches: [main, test]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                build_type: [release]

        steps:
            # 1️⃣ Checkout code
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  fetch-depth: 1

            # 2️⃣ Install dependencies
            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y ccache python3 python3-pip

            # 3️⃣ Cache pip
            - name: Cache pip
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pip
                  key: pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
                  restore-keys: |
                      pip-${{ runner.os }}-

            # 4️⃣ Setup ccache
            - name: Setup ccache
              run: |
                  mkdir -p ~/.ccache
                  echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
                  echo "CCACHE_MAXSIZE=3G" >> $GITHUB_ENV
                  echo "/usr/lib/ccache" >> $GITHUB_PATH
                  ccache --max-size=3G

            # 5️⃣ Cache ccache
            - name: Cache ccache
              uses: actions/cache@v4
              with:
                  path: ~/.ccache
                  key: ccache-${{ runner.os }}-${{ hashFiles('**/*.c','**/*.cpp','**/*.h') }}
                  restore-keys: |
                      ccache-${{ runner.os }}-

            # 6️⃣ Cache Gradle
            - name: Cache Gradle
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                  key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
                  restore-keys: |
                      gradle-${{ runner.os }}-

            # 7️⃣ Setup Java
            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17
                  cache: gradle

            # 8️⃣ Setup custom environment
            - name: Setup environment
              uses: ./.github/actions/setup
              with:
                  is-asset-build: true

            # 9️⃣ Replace version
            - name: Replace version
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      sed -i 's/^version=.*/version=MTR/' config.prop
                  else
                      sed -i 's/^version=.*/version=MTD/' config.prop
                  fi

            # 🔟 Build Magisk
            - name: Build Magisk
              run: |
                  if [ "${{ matrix.build_type }}" = "release" ]; then
                      python build.py -vr all
                  else
                      python build.py -v all
                  fi

            # 1️⃣1️⃣ Stop Gradle
            - name: Stop Gradle
              run: ./app/gradlew --stop

            # 1️⃣2️⃣ Upload artifact
            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: magisk_${{ matrix.build_type }}
                  path: ${{ matrix.build_type == 'release' && 'out/app-release.apk' || 'out/app-debug.apk' }}

            # 1️⃣3️⃣ Delete old release if exists
            - name: Delete old release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: build
                  remove_assets: true
              env:
                  GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
              continue-on-error: true

            # 1️⃣4️⃣ Create / replace release
            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: build
                  name: Build
                  draft: false
                  prerelease: false
                  files: |
                      ${{ matrix.build_type == 'release' && 'out/app-release.apk' || 'out/app-debug.apk' }}
                  retries: 1
              env:
                  GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}